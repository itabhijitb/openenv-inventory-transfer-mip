name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-typecheck-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: |
          ruff check .

      - name: Pyright (typecheck)
        run: |
          pyright

      - name: Pytest
        run: |
          pytest -q

      - name: OpenEnv validate
        run: |
          openenv validate .
